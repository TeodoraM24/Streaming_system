name: CI WORKFLOW

on:
  push:
    branches: [ dev ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'maven'

      # 3. Set up Docker for Testcontainers
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Cache SonarQube packages
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 5. Build, test AND SonarCloud analysis (samlet!)
      - name: Build, test and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: 86400000
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/dummy
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_JPA_HIBERNATE_DDL_AUTO: none
          SPRING_NEO4J_URI: bolt://localhost:7687
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/dummy
        run: |
          mvn --batch-mode clean verify sonar:sonar \
            -Dsonar.projectKey=TeodoraM24_Streaming_system \
            -Dsonar.organization=teodoram24 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}